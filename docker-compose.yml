services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: skaus
      POSTGRES_PASSWORD: skaus_dev
      POSTGRES_DB: skaus
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U skaus -d skaus']
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://skaus:skaus_dev@postgres:5432/skaus
      NODE_ENV: production
      PORT: 3001
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-devnet}
      STEALTH_POOL_PROGRAM_ID: ${STEALTH_POOL_PROGRAM_ID:-EAeFbo2SKK7KGiUwj4WHAYQxVEWFgiU1ygao9rnB7cGq}
      NAME_REGISTRY_PROGRAM_ID: ${NAME_REGISTRY_PROGRAM_ID:-JAmSyEVzHNCTzC6BETuRQdwK1gLQYUFnzwiVKRVYqpdT}
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      RELAYER_FEE_BPS: ${RELAYER_FEE_BPS:-10}
      MAX_PENDING_TXS: ${MAX_PENDING_TXS:-50}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
      WEB_APP_PUBLIC_URL: ${WEB_APP_PUBLIC_URL:-http://localhost}
      # ZK compression (optional — set to 'false' for local dev without a Photon node)
      ZK_COMPRESSION_ENABLED: ${ZK_COMPRESSION_ENABLED:-false}
      LIGHT_RPC_URL: ${LIGHT_RPC_URL:-}
      LIGHT_PROVER_URL: ${LIGHT_PROVER_URL:-https://prover.lightprotocol.com}
      # Helius Geyser real-time indexing (optional — falls back to polling)
      HELIUS_API_KEY: ${HELIUS_API_KEY:-}
      HELIUS_WS_URL: ${HELIUS_WS_URL:-}
    # Not published externally — nginx proxies to gateway on the internal network

  relayer:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.relayer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://skaus:skaus_dev@postgres:5432/skaus
      NODE_ENV: production
      RELAYER_PORT: 3002
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SOLANA_CLUSTER: ${SOLANA_CLUSTER:-devnet}
      STEALTH_POOL_PROGRAM_ID: ${STEALTH_POOL_PROGRAM_ID:-EAeFbo2SKK7KGiUwj4WHAYQxVEWFgiU1ygao9rnB7cGq}
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY}
      RELAYER_FEE_BPS: ${RELAYER_FEE_BPS:-10}
      RELAYER_MAX_CONCURRENT: ${RELAYER_MAX_CONCURRENT:-5}
      RELAYER_MAX_ATTEMPTS: ${RELAYER_MAX_ATTEMPTS:-3}
      RELAYER_POLL_INTERVAL_MS: ${RELAYER_POLL_INTERVAL_MS:-3000}
    # Internal service — not exposed through nginx; accessed by gateway or directly

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_PRIVY_APP_ID: ${NEXT_PUBLIC_PRIVY_APP_ID}
        NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-}
        NEXT_PUBLIC_SOLANA_RPC_URL: ${NEXT_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
        NEXT_PUBLIC_PROGRAM_ID: ${NEXT_PUBLIC_PROGRAM_ID:-EAeFbo2SKK7KGiUwj4WHAYQxVEWFgiU1ygao9rnB7cGq}
        NEXT_PUBLIC_NAME_REGISTRY_PROGRAM_ID: ${NEXT_PUBLIC_NAME_REGISTRY_PROGRAM_ID:-JAmSyEVzHNCTzC6BETuRQdwK1gLQYUFnzwiVKRVYqpdT}
        NEXT_PUBLIC_TOKEN_MINT: ${NEXT_PUBLIC_TOKEN_MINT:-4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}
        NEXT_PUBLIC_CLUSTER: ${NEXT_PUBLIC_CLUSTER:-devnet}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
        NEXT_PUBLIC_PUBLIC_LINK_BASE: ${NEXT_PUBLIC_PUBLIC_LINK_BASE:-}
    restart: unless-stopped
    depends_on:
      - gateway
    # Not published externally — nginx proxies to web on the internal network

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - gateway
    ports:
      - '80:80'
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
